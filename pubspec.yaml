name: mobifund
description: Mobifund — Group Finance Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # Local DB
  sqflite: ^2.3.3
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # UI
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utils
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.1.1
  http: ^1.2.0
  crypto: ^3.0.3
  shimmer: ^3.0.0
  animations: ^2.0.11
  pdf: ^3.12.0
  printing: ^5.14.3
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/mobifund_logo.svg
    - assets/images/logo_full.png
    - assets/images/logo_mark.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_mark.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_mark.png"
